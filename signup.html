<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container-fluid d-flex flex-column justify-content-center align-items-center vh-100 bg-light">

<div class="highlight">
<h1 id="main-heading">Planify</h1>
</div>

<div class="card p-5 shadow-lg" style="width: 400px;" id="form-container">
<h2 class="text-center">Sign Up</h2>

<form id="form1">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" id="name" placeholder="Enter your name">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="email" placeholder="Enter your email">
<p id="email-error" class="error"></p>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" id="password" placeholder="Enter password">
<p id="password-error" class="error"></p>
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" id="confirm-password" placeholder="Confirm password">
<p id="confirm-password-error" class="error"></p>
</div>

<button id="signup-button" type="submit" class="btn btn-primary w-100">
Sign Up
</button>

</form>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
