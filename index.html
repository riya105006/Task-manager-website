<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Task Manager Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="main-page" class="container-fluid min-vh-100">
        <div class="row min-vh-100">

            <!-- LEFT SECTION -->
            <div id="intro" class="col-md-6 col-sm-12 d-flex flex-column justify-content-center px-5">
                <h5 id="welcome">Welcome to</h5>

                <h1 class="fw-bold">
                    <span class="highlight">Planify</span>
                </h1>

                <ul class="tick-list mt-4">
                    <li>Organize Your Tasks Efficiently</li>
                    <li>Stay on Track with Your Work</li>
                    <li>Boost Your Productivity</li>
                </ul>

                <h6 class="Flow mt-4">
                    Manage your tasks with ease and efficiency.
                </h6>
            </div>

            <!-- RIGHT SECTION -->
            <div id="login_section" class="col-md-6 d-flex align-items-center justify-content-center">
                <div class="w-75">
                    <h2 class="mb-3">Login to Your Account</h2>
                    <p class="text-muted mb-4">Please enter your credentials to sign in.</p>

                    <form>
                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email-input" class="form-label">Email</label>
                            <input type="email" id="email-input" class="form-control mb-3"
                                placeholder="Enter your Email address" required>
                            <p id="email-error" class="error"></p>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password-input" class="form-label">Password</label>
                            <input type="password" id="password-input" class="form-control mb-3"
                                placeholder="Enter your Password" minlength="6" required>
                            <p id="password-error" class="error"></p>
                        </div>

                        <!-- Forgot Password -->
                        <a href="forgot.html" id="forgot_password">Forgot password?</a>

                        <!-- Login Button -->
                        <button id="login-button" class="btn btn-primary w-100 mt-3" type="submit">
                            Login
                        </button>

                        <!-- Sign Up Link -->
                        <div class="d-flex mt-3">
                            <h6 class="text-muted mt-1 fw-normal me-2">
                                Don't have an account yet?
                            </h6>
                            <a href="signup.html" id="signup1">Sign Up</a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
