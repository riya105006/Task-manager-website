<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Manager Login</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="main-page" class="container-fluid min-vh-100">
    <div class="row min-vh-100">

      <!-- LEFT SECTION -->
      <div
        id="intro"
        class="col-md-6 d-flex flex-column justify-content-center px-5"
      >
        <h5 id="welcome">Welcome to</h5>

        <h1 class="fw-bold">
          Task <span class="highlight">Manager</span>
        </h1>

        <ul class="tick-list mt-4">
          <li>Organize Your Tasks Efficiently</li>
          <li>Stay on Track with Your Work</li>
          <li>Boost Your Productivity</li>
        </ul>

        <h6 class="Flow mt-4">
          Manage your tasks with ease and efficiency.
        </h6>
      </div>

      <!-- RIGHT SECTION -->
      <div
        id="login_section"
        class="col-md-6 d-flex align-items-center justify-content-center"
      >
        <div class="w-75">
          <h2 class="mb-3">Login to Your Account</h2>
          <p class="text-muted mb-4">
            Please enter your credentials to sign in.
          </p>

          <input
            type="email"
            class="form-control mb-3"
            placeholder="Email Address"
          />

          <input
            type="password"
            class="form-control mb-3"
            placeholder="Password"
          />

          <button class="btn btn-primary w-100">Login</button>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
